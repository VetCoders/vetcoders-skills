dialect = "uk"
auto_sync = true
sync_address = "https://api.atuin.sh"
sync_frequency = "10m"

search_mode = "fuzzy"
filter_mode = "workspace"
workspaces = true
search_mode_shell_up_key_binding = "fuzzy"
filter_mode_shell_up_key_binding = "workspace"

style = "full"
inline_height = 20
inline_height_shell_up_key_binding = 12
show_preview = true
max_preview_height = 8
show_help = true
show_tabs = true
exit_mode = "return-original"
enter_accept = true
word_jump_mode = "emacs"
secrets_filter = true

history_filter = [
  "^ls$",
  "^cd( .*)?$",
  "^pwd$",
  "^clear$",
  "^history$",
]

[sync]
records = true
