[tool.uv.workspace]
members = ["vibecrafted-core", "vibecrafted-mcp"]

[dependency-groups]
dev = [
    "mypy>=1.13,<2",
    "pytest>=8,<10",
    "ruff>=0.8,<1",
]

[tool.mypy]
python_version = "3.10"
files = ["vibecrafted-core/vibecrafted_core", "vibecrafted-mcp/vibecrafted_mcp"]
ignore_missing_imports = true
follow_imports = "skip"
