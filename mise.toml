[tools]
# Keep the substrate small and explicit. Agent CLIs remain external for now,
# but repo tasks and helpers should run against a predictable Python/Node base.
python = "3.12"
node = "22"

[env]
VETCODERS_INSTALLER = "scripts/vetcoders_install.py"

[tasks.install]
description = "Install skills plus shell helpers"
run = "python3 \"$MISE_PROJECT_ROOT/$VETCODERS_INSTALLER\" install --source \"$MISE_PROJECT_ROOT\" --with-shell"

[tasks.skills]
description = "Install skills without shell helpers"
run = "python3 \"$MISE_PROJECT_ROOT/$VETCODERS_INSTALLER\" install --source \"$MISE_PROJECT_ROOT\""

[tasks.doctor]
description = "Verify install health, shell helpers, and zsh -ic smoke path"
run = "python3 \"$MISE_PROJECT_ROOT/$VETCODERS_INSTALLER\" doctor"

[tasks.list]
description = "List bundle contents and runtime foundations"
run = "python3 \"$MISE_PROJECT_ROOT/$VETCODERS_INSTALLER\" list --source \"$MISE_PROJECT_ROOT\""

[tasks.helpers]
description = "Install only the optional zsh helper layer"
run = "bash \"$MISE_PROJECT_ROOT/vc-agents/scripts/install-shell.sh\" --source \"$MISE_PROJECT_ROOT\""

[tasks.frontier-config]
description = "Install repo-owned Starship, Atuin, and Zellij presets"
run = "bash \"$MISE_PROJECT_ROOT/vc-agents/scripts/install-frontier-config.sh\" --source \"$MISE_PROJECT_ROOT\""

[tasks.frontier-config-dry-run]
description = "Preview frontier config installation"
run = "bash \"$MISE_PROJECT_ROOT/vc-agents/scripts/install-frontier-config.sh\" --source \"$MISE_PROJECT_ROOT\" --dry-run"
